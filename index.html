<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hub de Estudos — Concurso</title>

    <!-- Fabric.js (CDN) -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/fabric.js/5.3.0/fabric.min.js">
    </script>

    <style>
        /* ============================================================
           VARIÁVEIS CSS — Tema Dark Moderno
           ============================================================ */
        :root {
            --bg-primary: #0d0d17;
            --bg-secondary: #141428;
            --bg-tertiary: #1a1a30;
            --bg-sidebar: #111122;
            --bg-card: #1c1c36;
            --bg-hover: #232344;
            --bg-active: #2a2a50;
            --bg-accent: #7c3aed;
            --bg-accent-hover: #8b5cf6;
            --bg-accent-muted: rgba(124, 58, 237, 0.12);
            --bg-accent-muted-hover: rgba(124, 58, 237, 0.22);
            --text-primary: #e2e2f0;
            --text-secondary: #b0b0c8;
            --text-muted: #7878a0;
            --text-accent: #a78bfa;
            --border-subtle: #252540;
            --border-accent: #7c3aed;
            --shadow-lg: 0 8px 32px rgba(0, 0, 0, 0.45);
            --shadow-md: 0 4px 16px rgba(0, 0, 0, 0.35);
            --shadow-sm: 0 2px 8px rgba(0, 0, 0, 0.25);
            --radius-sm: 6px;
            --radius-md: 10px;
            --radius-lg: 14px;
            --radius-xl: 18px;
            --transition-fast: 0.18s cubic-bezier(0.4, 0, 0.2, 1);
            --transition-smooth: 0.28s cubic-bezier(0.4, 0, 0.2, 1);
            --transition-sidebar: 0.32s cubic-bezier(0.4, 0, 0.2, 1);
            --sidebar-width: 290px;
            --topbar-height: 52px;
            --font-family: 'Segoe UI', 'Inter', system-ui, -apple-system, sans-serif;
            --font-mono: 'JetBrains Mono', 'Fira Code', 'Consolas', monospace;
            --toolbar-btn-size: 44px;
            --fab-size: 56px;
        }

        /* ============================================================
           RESET & BASE
           ============================================================ */
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html {
            font-size: 15px;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            scroll-behavior: smooth;
        }

        body {
            font-family: var(--font-family);
            background: var(--bg-primary);
            color: var(--text-primary);
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            display: flex;
            user-select: none;
            -webkit-user-select: none;
            -webkit-tap-highlight-color: transparent;
            letter-spacing: 0.01em;
        }

        /* ============================================================
           SCROLLBAR PERSONALIZADO (SIDEBAR)
           ============================================================ */
        ::-webkit-scrollbar {
            width: 5px;
            height: 5px;
        }
        ::-webkit-scrollbar-track {
            background: transparent;
            border-radius: 10px;
        }
        ::-webkit-scrollbar-thumb {
            background: #3a3a58;
            border-radius: 10px;
            transition: background var(--transition-fast);
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #52527a;
        }
        ::-webkit-scrollbar-corner {
            background: transparent;
        }

        /* ============================================================
           LAYOUT PRINCIPAL
           ============================================================ */
        #app-container {
            display: flex;
            width: 100%;
            height: 100vh;
            position: relative;
            overflow: hidden;
        }

        /* ============================================================
           SIDEBAR
           ============================================================ */
        #sidebar {
            width: var(--sidebar-width);
            min-width: var(--sidebar-width);
            height: 100vh;
            background: var(--bg-sidebar);
            border-right: 1px solid var(--border-subtle);
            display: flex;
            flex-direction: column;
            z-index: 100;
            transition: width var(--transition-sidebar), min-width var(--transition-sidebar), transform var(--transition-sidebar), opacity var(--transition-sidebar);
            overflow: hidden;
            position: relative;
            box-shadow: var(--shadow-lg);
            flex-shrink: 0;
        }

        #sidebar.collapsed {
            width: 0;
            min-width: 0;
            opacity: 0;
            pointer-events: none;
            border-right: none;
            box-shadow: none;
        }

        /* Sidebar Header */
        .sidebar-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 16px 18px 14px 18px;
            border-bottom: 1px solid var(--border-subtle);
            gap: 10px;
            flex-shrink: 0;
            min-height: 60px;
        }

        .sidebar-logo {
            display: flex;
            align-items: center;
            gap: 10px;
            font-weight: 700;
            font-size: 1.05rem;
            color: var(--text-primary);
            letter-spacing: 0.02em;
            white-space: nowrap;
        }
        .sidebar-logo svg {
            flex-shrink: 0;
            opacity: 0.9;
        }
        .sidebar-logo .logo-dot {
            color: var(--text-accent);
        }

        .btn-close-sidebar {
            background: none;
            border: none;
            cursor: pointer;
            padding: 6px;
            border-radius: var(--radius-sm);
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-muted);
            transition: all var(--transition-fast);
            flex-shrink: 0;
        }
        .btn-close-sidebar:hover {
            color: var(--text-primary);
            background: var(--bg-hover);
        }

        /* Search dentro da sidebar */
        .sidebar-search-wrap {
            padding: 12px 16px;
            flex-shrink: 0;
            position: relative;
        }
        .sidebar-search-wrap .search-icon {
            position: absolute;
            left: 28px;
            top: 50%;
            transform: translateY(-50%);
            pointer-events: none;
            color: var(--text-muted);
            display: flex;
            align-items: center;
        }
        #sidebar-search {
            width: 100%;
            padding: 10px 14px 10px 38px;
            border-radius: var(--radius-md);
            border: 1px solid var(--border-subtle);
            background: var(--bg-tertiary);
            color: var(--text-primary);
            font-size: 0.88rem;
            font-family: var(--font-family);
            outline: none;
            transition: all var(--transition-fast);
            letter-spacing: 0.01em;
        }
        #sidebar-search::placeholder {
            color: var(--text-muted);
            opacity: 0.7;
        }
        #sidebar-search:focus {
            border-color: var(--border-accent);
            box-shadow: 0 0 0 3px var(--bg-accent-muted);
            background: var(--bg-card);
        }

        /* Lista de decks (scrollável) */
        .sidebar-decks-list {
            flex: 1;
            overflow-y: auto;
            overflow-x: hidden;
            padding: 8px 10px 16px 10px;
            scroll-behavior: smooth;
        }

        /* Deck item */
        .deck-group {
            margin-bottom: 4px;
            border-radius: var(--radius-md);
            overflow: hidden;
            transition: background var(--transition-fast);
        }
        .deck-group.hidden-deck {
            display: none;
        }

        .deck-header {
            display: flex;
            align-items: center;
            gap: 9px;
            padding: 10px 12px;
            cursor: pointer;
            border-radius: var(--radius-md);
            transition: all var(--transition-fast);
            font-weight: 600;
            font-size: 0.92rem;
            color: var(--text-primary);
            white-space: nowrap;
        }
        .deck-header:hover {
            background: var(--bg-hover);
        }
        .deck-header .deck-icon {
            flex-shrink: 0;
            color: var(--text-accent);
            display: flex;
            align-items: center;
        }
        .deck-header .deck-chevron {
            margin-left: auto;
            flex-shrink: 0;
            transition: transform var(--transition-smooth);
            color: var(--text-muted);
            display: flex;
            align-items: center;
        }
        .deck-group.expanded>.deck-header .deck-chevron {
            transform: rotate(0deg);
        }
        .deck-group:not(.expanded)>.deck-header .deck-chevron {
            transform: rotate(-90deg);
        }
        .deck-header .deck-badge {
            font-size: 0.7rem;
            background: var(--bg-accent-muted);
            color: var(--text-accent);
            padding: 2px 8px;
            border-radius: 20px;
            font-weight: 500;
            margin-left: 6px;
            letter-spacing: 0.03em;
        }

        /* Categorias */
        .deck-categories {
            overflow: hidden;
            transition: max-height var(--transition-smooth), opacity var(--transition-smooth);
            max-height: 2000px;
            opacity: 1;
        }
        .deck-group:not(.expanded)>.deck-categories {
            max-height: 0;
            opacity: 0;
        }

        .category-group {
            margin: 2px 0 2px 8px;
            border-radius: var(--radius-sm);
            overflow: hidden;
        }
        .category-group.hidden-category {
            display: none;
        }

        .category-header {
            display: flex;
            align-items: center;
            gap: 7px;
            padding: 7px 10px 7px 16px;
            cursor: pointer;
            border-radius: var(--radius-sm);
            transition: all var(--transition-fast);
            font-weight: 500;
            font-size: 0.83rem;
            color: var(--text-secondary);
            white-space: nowrap;
        }
        .category-header:hover {
            background: var(--bg-hover);
            color: var(--text-primary);
        }
        .category-header .cat-icon {
            flex-shrink: 0;
            color: var(--text-muted);
            display: flex;
            align-items: center;
            transition: color var(--transition-fast);
        }
        .category-header:hover .cat-icon {
            color: var(--text-secondary);
        }
        .category-header .cat-chevron {
            margin-left: auto;
            flex-shrink: 0;
            transition: transform var(--transition-smooth);
            color: var(--text-muted);
            display: flex;
            align-items: center;
        }
        .category-group.expanded>.category-header .cat-chevron {
            transform: rotate(0deg);
        }
        .category-group:not(.expanded)>.category-header .cat-chevron {
            transform: rotate(-90deg);
        }
        .category-header .cat-count {
            font-size: 0.68rem;
            color: var(--text-muted);
            margin-left: 4px;
            opacity: 0.7;
        }

        /* Itens */
        .category-items {
            overflow: hidden;
            transition: max-height var(--transition-smooth), opacity var(--transition-smooth);
            max-height: 1500px;
            opacity: 1;
        }
        .category-group:not(.expanded)>.category-items {
            max-height: 0;
            opacity: 0;
        }

        .resume-item {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 7px 10px 7px 28px;
            cursor: pointer;
            border-radius: var(--radius-sm);
            transition: all var(--transition-fast);
            font-size: 0.8rem;
            color: var(--text-secondary);
            white-space: nowrap;
            position: relative;
            margin: 1px 0;
        }
        .resume-item:hover {
            background: var(--bg-hover);
            color: var(--text-primary);
        }
        .resume-item.active {
            background: var(--bg-accent-muted);
            color: var(--text-accent);
            font-weight: 500;
            box-shadow: inset 3px 0 0 var(--bg-accent);
            border-radius: var(--radius-sm);
        }
        .resume-item .item-icon {
            flex-shrink: 0;
            color: var(--text-muted);
            display: flex;
            align-items: center;
            transition: color var(--transition-fast);
        }
        .resume-item.active .item-icon {
            color: var(--text-accent);
        }
        .resume-item.hidden-item {
            display: none;
        }

        /* ============================================================
           MAIN AREA
           ============================================================ */
        #main-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            height: 100vh;
            min-width: 0;
            background: var(--bg-primary);
            position: relative;
            transition: all var(--transition-sidebar);
        }

        /* ============================================================
           TOP BAR
           ============================================================ */
        #topbar {
            display: flex;
            align-items: center;
            height: var(--topbar-height);
            min-height: var(--topbar-height);
            padding: 0 14px;
            gap: 10px;
            background: var(--bg-secondary);
            border-bottom: 1px solid var(--border-subtle);
            z-index: 50;
            box-shadow: var(--shadow-sm);
            transition: all var(--transition-smooth);
        }

        .topbar-btn {
            background: none;
            border: none;
            cursor: pointer;
            padding: 7px;
            border-radius: var(--radius-sm);
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-secondary);
            transition: all var(--transition-fast);
            flex-shrink: 0;
            position: relative;
        }
        .topbar-btn:hover {
            color: var(--text-primary);
            background: var(--bg-hover);
        }
        .topbar-btn:active {
            transform: scale(0.94);
            transition: transform 0.08s ease;
        }
        .topbar-btn.tooltip::after {
            content: attr(data-tooltip);
            position: absolute;
            bottom: -30px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--bg-card);
            color: var(--text-primary);
            padding: 4px 10px;
            border-radius: var(--radius-sm);
            font-size: 0.7rem;
            white-space: nowrap;
            pointer-events: none;
            opacity: 0;
            transition: opacity var(--transition-fast);
            border: 1px solid var(--border-subtle);
            z-index: 200;
        }
        .topbar-btn.tooltip:hover::after {
            opacity: 1;
        }

        /* Breadcrumb */
        #breadcrumb-container {
            display: flex;
            align-items: center;
            gap: 6px;
            flex: 1;
            min-width: 0;
            overflow: hidden;
            padding: 0 6px;
        }
        .breadcrumb-sep {
            color: var(--text-muted);
            font-size: 0.8rem;
            flex-shrink: 0;
            opacity: 0.5;
        }
        .breadcrumb-item {
            font-size: 0.84rem;
            color: var(--text-secondary);
            white-space: nowrap;
            cursor: default;
            transition: color var(--transition-fast);
            padding: 3px 6px;
            border-radius: var(--radius-sm);
            letter-spacing: 0.01em;
        }
        .breadcrumb-item.clickable {
            cursor: pointer;
        }
        .breadcrumb-item.clickable:hover {
            color: var(--text-primary);
            background: var(--bg-hover);
        }
        .breadcrumb-item.current {
            color: var(--text-accent);
            font-weight: 600;
        }
        .breadcrumb-home {
            cursor: pointer;
            padding: 4px;
            border-radius: var(--radius-sm);
            display: flex;
            align-items: center;
            color: var(--text-muted);
            transition: all var(--transition-fast);
            flex-shrink: 0;
        }
        .breadcrumb-home:hover {
            color: var(--text-primary);
            background: var(--bg-hover);
        }

        /* Spacer */
        .topbar-spacer {
            flex: 1;
            min-width: 20px;
        }

        /* ============================================================
           CONTENT AREA (iframe + welcome + annotation)
           ============================================================ */
        #content-area {
            flex: 1;
            position: relative;
            overflow: hidden;
            background: var(--bg-primary);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Iframe */
        #resume-iframe {
            width: 100%;
            height: 100%;
            border: none;
            background: #fff;
            opacity: 0;
            transition: opacity 0.35s ease;
            position: absolute;
            inset: 0;
            z-index: 10;
        }
        #resume-iframe.loaded {
            opacity: 1;
        }

        /* Loader */
        #iframe-loader {
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 5;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.25s ease;
        }
        #iframe-loader.visible {
            opacity: 1;
        }
        .loader-spinner {
            width: 40px;
            height: 40px;
            border: 3px solid var(--border-subtle);
            border-top-color: var(--bg-accent);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        /* Welcome Screen */
        #welcome-screen {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 40px;
            z-index: 1;
            transition: opacity 0.3s ease;
        }
        #welcome-screen.hidden {
            opacity: 0;
            pointer-events: none;
        }
        .welcome-icon {
            margin-bottom: 20px;
            opacity: 0.7;
        }
        .welcome-title {
            font-size: 1.6rem;
            font-weight: 700;
            color: var(--text-primary);
            margin-bottom: 8px;
            letter-spacing: 0.02em;
        }
        .welcome-subtitle {
            font-size: 0.95rem;
            color: var(--text-muted);
            max-width: 420px;
            line-height: 1.5;
            letter-spacing: 0.01em;
        }
        .welcome-stats {
            display: flex;
            gap: 24px;
            margin-top: 28px;
            flex-wrap: wrap;
            justify-content: center;
        }
        .welcome-stat {
            background: var(--bg-card);
            border: 1px solid var(--border-subtle);
            border-radius: var(--radius-lg);
            padding: 16px 22px;
            text-align: center;
            min-width: 100px;
            transition: all var(--transition-fast);
        }
        .welcome-stat:hover {
            border-color: var(--border-accent);
            box-shadow: var(--shadow-md);
            transform: translateY(-2px);
        }
        .welcome-stat-value {
            font-size: 1.8rem;
            font-weight: 700;
            color: var(--text-accent);
            letter-spacing: 0.03em;
        }
        .welcome-stat-label {
            font-size: 0.72rem;
            color: var(--text-muted);
            margin-top: 4px;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        /* ============================================================
           ANOTAÇÕES — CAMADA FLUTUANTE
           ============================================================ */
        #annotation-container {
            position: absolute;
            inset: 0;
            z-index: 20;
            pointer-events: none;
            /* container não bloqueia, mas os filhos com auto recebem eventos */
            display: none;
            /* controlado via JS */
        }

        #annotation-container.active {
            display: block;
        }

        /* Canvas principal (Fabric) */
        #annotation-canvas {
            width: 100%;
            height: 100%;
            pointer-events: auto;
            touch-action: none;
            cursor: crosshair;
            position: absolute;
            top: 0;
            left: 0;
        }

        /* ============================================================
           BOLHA FLUTUANTE (FAB)
           ============================================================ */
        #annotation-fab {
            position: absolute;
            bottom: 24px;
            right: 24px;
            width: var(--fab-size);
            height: var(--fab-size);
            border-radius: 50%;
            background: var(--bg-accent);
            color: #fff;
            border: none;
            box-shadow: var(--shadow-lg);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            pointer-events: auto;
            z-index: 25;
            transition: transform 0.2s ease, background 0.2s ease;
        }
        #annotation-fab:hover {
            background: var(--bg-accent-hover);
            transform: scale(1.05);
        }
        #annotation-fab:active {
            transform: scale(0.92);
        }
        #annotation-fab svg {
            width: 28px;
            height: 28px;
            stroke: currentColor;
            fill: none;
            stroke-width: 2;
            stroke-linecap: round;
            stroke-linejoin: round;
        }
        #annotation-fab.hidden-fab {
            display: none;
        }

        /* Toolbar flutuante */
        #annotation-toolbar {
            position: absolute;
            bottom: 90px;
            /* acima da bolha */
            right: 24px;
            background: var(--bg-card);
            border-radius: var(--radius-lg);
            padding: 10px 14px;
            box-shadow: var(--shadow-lg);
            display: flex;
            gap: 6px;
            align-items: center;
            pointer-events: auto;
            flex-wrap: wrap;
            border: 1px solid var(--border-subtle);
            max-width: 90vw;
            backdrop-filter: blur(4px);
            background: rgba(28, 28, 54, 0.92);
            z-index: 26;
            transition: opacity 0.2s ease, transform 0.2s ease;
            transform-origin: bottom right;
        }
        #annotation-toolbar.collapsed-toolbar {
            opacity: 0;
            pointer-events: none;
            transform: scale(0.8);
        }

        #annotation-toolbar .tool-group {
            display: flex;
            gap: 4px;
            align-items: center;
            flex-wrap: wrap;
        }

        #annotation-toolbar .tool-group+.tool-group {
            margin-left: 6px;
            padding-left: 6px;
            border-left: 1px solid var(--border-subtle);
        }

        .toolbar-btn {
            background: transparent;
            border: none;
            cursor: pointer;
            width: var(--toolbar-btn-size);
            height: var(--toolbar-btn-size);
            border-radius: var(--radius-md);
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-secondary);
            transition: all var(--transition-fast);
            font-size: 0.8rem;
            padding: 6px;
            position: relative;
        }
        .toolbar-btn:hover {
            background: var(--bg-hover);
            color: var(--text-primary);
        }
        .toolbar-btn.active {
            background: var(--bg-accent-muted);
            color: var(--text-accent);
            box-shadow: inset 0 0 0 1px var(--border-accent);
        }
        .toolbar-btn svg {
            width: 22px;
            height: 22px;
            stroke: currentColor;
            fill: none;
            stroke-width: 2;
            stroke-linecap: round;
            stroke-linejoin: round;
        }
        .toolbar-btn .color-dot {
            width: 22px;
            height: 22px;
            border-radius: 50%;
            border: 2px solid var(--border-subtle);
            transition: border-color var(--transition-fast);
            flex-shrink: 0;
        }
        .toolbar-btn .color-dot.active-dot {
            border-color: var(--text-accent);
            box-shadow: 0 0 0 2px var(--bg-accent-muted);
        }
        .toolbar-btn .color-dot:hover {
            border-color: var(--text-primary);
        }

        .toolbar-slider {
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .toolbar-slider input[type="range"] {
            width: 70px;
            height: 4px;
            -webkit-appearance: none;
            appearance: none;
            background: var(--border-subtle);
            border-radius: 4px;
            outline: none;
        }
        .toolbar-slider input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 14px;
            height: 14px;
            border-radius: 50%;
            background: var(--bg-accent);
            cursor: pointer;
            border: 2px solid var(--bg-card);
        }
        .toolbar-slider input[type="range"]::-moz-range-thumb {
            width: 14px;
            height: 14px;
            border-radius: 50%;
            background: var(--bg-accent);
            cursor: pointer;
            border: 2px solid var(--bg-card);
        }
        .toolbar-slider span {

            // ============================================================

            // ============================================================
            const STORAGE_KEYS = {
                sidebarVisible: 'hub_sidebarVisible',
                expandedDecks: 'hub_expandedDecks',
                expandedCategories: 'hub_expandedCategories',
                lastResume: 'hub_lastResume',
            };

            function saveToStorage(key, value) {
                try {
                    if (value instanceof Set) {
                        localStorage.setItem(key, JSON.stringify([...value]));
                    } else if (typeof value === 'object' && value !== null) {
                        localStorage.setItem(key, JSON.stringify(value));
                    } else {
                        localStorage.setItem(key, String(value));
                    }
                } catch (e) {
                    // localStorage pode não estar disponível
                }
            }

            function loadFromStorage(key, fallback) {
                try {
                    const raw = localStorage.getItem(key);
                    if (raw === null || raw === undefined) return fallback;
                    const parsed = JSON.parse(raw);
                    if (fallback instanceof Set && Array.isArray(parsed)) {
                        return new Set(parsed);
                    }
                    return parsed !== null && parsed !== undefined ? parsed : fallback;
                } catch (e) {
                    return fallback;
                }
            }

            function loadState() {
                state.sidebarVisible = loadFromStorage(STORAGE_KEYS.sidebarVisible, true);
                state.expandedDecks = loadFromStorage(STORAGE_KEYS.expandedDecks, new Set(['deck-conhecimentos',
                    'deck-portugues', 'deck-adm', 'deck-info', 'deck-vendas'
                ]));
                state.expandedCategories = loadFromStorage(STORAGE_KEYS.expandedCategories, new Set());
                const lastResume = loadFromStorage(STORAGE_KEYS.lastResume, null);
                if (lastResume && lastResume.deckId && lastResume.fileName) {
                    state.activeResume = lastResume;
                }
            }

            function persistState() {
                saveToStorage(STORAGE_KEYS.sidebarVisible, state.sidebarVisible);
                saveToStorage(STORAGE_KEYS.expandedDecks, state.expandedDecks);
                saveToStorage(STORAGE_KEYS.expandedCategories, state.expandedCategories);
                saveToStorage(STORAGE_KEYS.lastResume, state.activeResume);
            }

            // ============================================================
            // RENDERIZAÇÃO DA SIDEBAR
            // ============================================================
            function renderSidebar() {
                $sidebarDecksList.innerHTML = '';

                DECKS.forEach((deck) => {
                    const deckGroup = document.createElement('div');
                    deckGroup.className = 'deck-group';
                    deckGroup.dataset.deckId = deck.id;
                    if (state.expandedDecks.has(deck.id)) {
                        deckGroup.classList.add('expanded');
                    }

                    const deckHeader = document.createElement('div');
                    deckHeader.className = 'deck-header';
                    deckHeader.innerHTML = `
                        <span class="deck-icon">${ICONS.book(18)}</span>
                        <span>${escapeHTML(deck.name)}</span>
                        <span class="deck-badge">${countTotalItems(deck)}</span>
                        <span class="deck-chevron">${ICONS.chevronDown(14)}</span>
                    `;
                    deckHeader.addEventListener('click', (e) => {
                        e.stopPropagation();
                        toggleDeck(deck.id);
                    });
                    deckGroup.appendChild(deckHeader);

                    const categoriesContainer = document.createElement('div');
                    categoriesContainer.className = 'deck-categories';

                    deck.categories.forEach((cat, catIndex) => {
                        const catGroup = document.createElement('div');
                        catGroup.className = 'category-group';
                        catGroup.dataset.categoryKey = `${deck.id}|${catIndex}`;
                        if (state.expandedCategories.has(`${deck.id}|${catIndex}`)) {
                            catGroup.classList.add('expanded');
                        }

                        const catHeader = document.createElement('div');
                        catHeader.className = 'category-header';
                        catHeader.innerHTML = `
                            <span class="cat-icon">${ICONS.folder(15)}</span>
                            <span>${escapeHTML(cat.name)}</span>
                            <span class="cat-count">(${cat.items.length})</span>
                            <span class="cat-chevron">${ICONS.chevronDown(12)}</span>
                        `;
                        catHeader.addEventListener('click', (e) => {
                            e.stopPropagation();
                            toggleCategory(deck.id, catIndex);
                        });
                        catGroup.appendChild(catHeader);

                        const itemsContainer = document.createElement('div');
                        itemsContainer.className = 'category-items';

                        cat.items.forEach((item, itemIndex) => {
                            const itemEl = document.createElement('div');
                            itemEl.className = 'resume-item';
                            itemEl.dataset.deckId = deck.id;
                            itemEl.dataset.catIndex = catIndex;
                            itemEl.dataset.itemIndex = itemIndex;
                            itemEl.dataset.searchText = (deck.name + ' ' + cat
                                .name + ' ' + item.name).toLowerCase();
                            itemEl.innerHTML = `
                                <span class="item-icon">${ICONS.document(14)}</span>
                                <span>${escapeHTML(item.name)}</span>
                            `;
                            if (
                                state.activeResume &&
                                state.activeResume.deckId === deck.id &&
                                state.activeResume.categoryIndex === catIndex &&
                                state.activeResume.itemIndex === itemIndex
                            ) {
                                itemEl.classList.add('active');
                            }
                            itemEl.addEventListener('click', (e) => {
                                e.stopPropagation();
                                openResume(deck, catIndex, itemIndex, cat, item);
                            });
                            itemsContainer.appendChild(itemEl);
                        });

                        catGroup.appendChild(itemsContainer);
                        categoriesContainer.appendChild(catGroup);
                    });

                    deckGroup.appendChild(categoriesContainer);
                    $sidebarDecksList.appendChild(deckGroup);
                });

                if (state.searchQuery.trim()) {
                    applySearchFilter(state.searchQuery);
                }
            }

            function countTotalItems(deck) {
                let count = 0;
                deck.categories.forEach(cat => { count += cat.items.length; });
                return count;
            }

            function escapeHTML(str) {
                const div = document.createElement('div');
                div.textContent = str;
                return div.innerHTML;
            }

            // ============================================================
            // NAVEGAÇÃO E AÇÕES
            // ============================================================
            function toggleDeck(deckId) {
                if (state.expandedDecks.has(deckId)) {
                    state.expandedDecks.delete(deckId);
                } else {
                    state.expandedDecks.add(deckId);
                }
                if (state.searchQuery.trim()) {
                    state.expandedDecks.add(deckId);
                }
                persistState();
                renderSidebar();
            }

            function toggleCategory(deckId, catIndex) {
                const key = `${deckId}|${catIndex}`;
                if (state.expandedCategories.has(key)) {
                    state.expandedCategories.delete(key);
                } else {
                    state.expandedCategories.add(key);
                }
                if (state.searchQuery.trim()) {
                    state.expandedCategories.add(key);
                }
                persistState();
                renderSidebar();
            }

            // ============================================================
            // openResume e goBackToWelcome (integrados com anotações)
            // ============================================================
            function openResume(deck, catIndex, itemIndex, cat, item) {
                // Salva anotações do resumo anterior
                if (state.activeResume && state.activeResume.fileName) {
                    AnnotationModule.save(state.activeResume.fileName);
                }

                state.activeResume = {
                    deckId: deck.id,
                    categoryIndex: catIndex,
                    itemIndex: itemIndex,
                    deckName: deck.name,
                    categoryName: cat.name,
                    itemName: item.name,
                    fileName: item.file,
                };
                state.expandedDecks.add(deck.id);
                state.expandedCategories.add(`${deck.id}|${catIndex}`);
                persistState();
                renderSidebar();
                loadIframe(item.file);

                // Carregar anotações do novo resumo e expandir
                AnnotationModule.load(item.file);
                AnnotationModule.expand();

                updateBreadcrumb(deck.name, cat.name, item.name);
                showIframe();
                setTimeout(() => {
                    const activeItem = $sidebarDecksList.querySelector('.resume-item.active');
                    if (activeItem) {
                        activeItem.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
                    }
                }, 150);
            }

            function goBackToWelcome() {
                if (state.activeResume && state.activeResume.fileName) {
                    AnnotationModule.save(state.activeResume.fileName);
                }
                state.activeResume = null;
                persistState();
                renderSidebar();
                clearIframe();
                updateBreadcrumb(null, null, null);
                showWelcome();
                AnnotationModule.hide();
            }

            function loadIframe(fileName) {
                $iframeLoader.classList.add('visible');
                $resumeIframe.classList.remove('loaded');
                setTimeout(() => {
                    $resumeIframe.src = fileName;
                }, 60);
            }

            function clearIframe() {
                $resumeIframe.classList.remove('loaded');
                $resumeIframe.src = '';
                $iframeLoader.classList.remove('visible');
            }

            function showIframe() {
                $welcomeScreen.classList.add('hidden');
                $resumeIframe.style.display = '';
            }

            function showWelcome() {
                $welcomeScreen.classList.remove('hidden');
                $resumeIframe.style.display = 'none';
                $resumeIframe.classList.remove('loaded');
                $iframeLoader.classList.remove('visible');
                updateWelcomeStats();
            }

            function updateBreadcrumb(deckName, catName, itemName) {
                const existingItems = $breadcrumbContainer.querySelectorAll(
                    '.breadcrumb-sep, .breadcrumb-item');
                existingItems.forEach(el => el.remove());

                if (!deckName && !itemName) {
                    const span = document.createElement('span');
                    span.className = 'breadcrumb-item current';
                    span.textContent = 'Nenhum resumo selecionado';
                    $breadcrumbContainer.appendChild(span);
                    return;
                }

                const deckSpan = document.createElement('span');
                deckSpan.className = 'breadcrumb-item clickable';
                deckSpan.textContent = deckName;
                deckSpan.addEventListener('click', goBackToWelcome);
                $breadcrumbContainer.appendChild(deckSpan);

                if (catName) {
                    const sep1 = document.createElement('span');
                    sep1.className = 'breadcrumb-sep';
                    sep1.textContent = '›';
                    $breadcrumbContainer.appendChild(sep1);

                    const catSpan = document.createElement('span');
                    catSpan.className = 'breadcrumb-item clickable';
                    catSpan.textContent = catName;
                    catSpan.addEventListener('click', goBackToWelcome);
                    $breadcrumbContainer.appendChild(catSpan);
                }

                if (itemName) {
                    const sep2 = document.createElement('span');
                    sep2.className = 'breadcrumb-sep';
                    sep2.textContent = '›';
                    $breadcrumbContainer.appendChild(sep2);

                    const itemSpan = document.createElement('span');
                    itemSpan.className = 'breadcrumb-item current';
                    itemSpan.textContent = itemName;
                    $breadcrumbContainer.appendChild(itemSpan);
                }
            }

            function updateWelcomeStats() {
                let totalDecks = DECKS.length;
                let totalCategories = 0;
                let totalItems = 0;
                DECKS.forEach(deck => {
                    totalCategories += deck.categories.length;
                    deck.categories.forEach(cat => { totalItems += cat.items.length; });
                });
                $welcomeStats.innerHTML = `
                    <div class="welcome-stat">
                        <div class="welcome-stat-value">${totalDecks}</div>
                        <div class="welcome-stat-label">Deck${totalDecks !== 1 ? 's' : ''}</div>
                    </div>
                    <div class="welcome-stat">
                        <div class="welcome-stat-value">${totalCategories}</div>
                        <div class="welcome-stat-label">Categorias</div>
                    </div>
                    <div class="welcome-stat">
                        <div class="welcome-stat-value">${totalItems}</div>
                        <div class="welcome-stat-label">Resumos</div>
                    </div>
                `;
            }

            // ============================================================
            // SIDEBAR VISIBILIDADE
            // ============================================================
            function setSidebarVisible(visible) {
                state.sidebarVisible = visible;
                if (visible) {
                    $sidebar.classList.remove('collapsed');
                    $sidebarOverlay.classList.remove('visible');
                } else {
                    $sidebar.classList.add('collapsed');
                    $sidebarOverlay.classList.remove('visible');
                }
                persistState();
            }

            function toggleSidebar() {
                setSidebarVisible(!state.sidebarVisible);
            }

            // ============================================================
            // PESQUISA / FILTRO
            // ============================================================
            function applySearchFilter(query) {
                const q = query.toLowerCase().trim();
                state.searchQuery = q;

                const allDecks = $sidebarDecksList.querySelectorAll('.deck-group');
                allDecks.forEach(deckEl => {
                    const deckId = deckEl.dataset.deckId;
                    let deckHasVisible = false;

                    const allCategories = deckEl.querySelectorAll('.category-group');
                    allCategories.forEach(catEl => {
                        const catKey = catEl.dataset.categoryKey;
                        let catHasVisible = false;

                        const allItems = catEl.querySelectorAll('.resume-item');
                        allItems.forEach(itemEl => {
                            const searchText = itemEl.dataset.searchText || '';
                            if (!q || searchText.includes(q)) {
                                itemEl.classList.remove('hidden-item');
                                catHasVisible = true;
                            } else {
                                itemEl.classList.add('hidden-item');
                            }
                        });

                        if (catHasVisible || !q) {
                            catEl.classList.remove('hidden-category');
                            deckHasVisible = true;
                            if (q && catHasVisible) {
                                catEl.classList.add('expanded');
                            }
                        } else {
                            catEl.classList.add('hidden-category');
                        }
                    });

                    if (deckHasVisible || !q) {
                        deckEl.classList.remove('hidden-deck');
                        if (q && deckHasVisible) {
                            deckEl.classList.add('expanded');
                        }
                    } else {
                        deckEl.classList.add('hidden-deck');
                    }
                });
            }

            function clearSearch() {
                state.searchQuery = '';
                $sidebarSearch.value = '';
                applySearchFilter('');
                renderSidebar();
            }

            // ============================================================
            // TELA CHEIA
            // ============================================================
            function toggleFullscreen() {
                if (!document.fullscreenElement && !document.webkitFullscreenElement) {
                    const el = document.getElementById('main-area');
                    if (el.requestFullscreen) {
                        el.requestFullscreen().catch(() => {});
                    } else if (el.webkitRequestFullscreen) {
                        el.webkitRequestFullscreen();
                    }
                } else {
                    if (document.exitFullscreen) {
                        document.exitFullscreen();
                    } else if (document.webkitExitFullscreen) {
                        document.webkitExitFullscreen();
                    }
                }
            }

            function updateFullscreenUI(isFullscreen) {
                state.isFullscreen = isFullscreen;
                if (isFullscreen) {
                    $iconFsEnter.style.display = 'none';
                    $iconFsExit.style.display = '';
                    $btnFullscreen.setAttribute('data-tooltip', 'Sair da Tela Cheia');
                } else {
                    $iconFsEnter.style.display = '';
                    $iconFsExit.style.display = 'none';
                    $btnFullscreen.setAttribute('data-tooltip', 'Tela Cheia');
                }
            }

            // ============================================================
            // MÓDULO DE ANOTAÇÕES (CORRIGIDO)
            // ============================================================
            const AnnotationModule = (function() {
                // Referências DOM
                const container = document.getElementById('annotation-container');
                const canvasEl = document.getElementById('annotation-canvas');
                const toolbar = document.getElementById('annotation-toolbar');
                const fab = document.getElementById('annotation-fab');
                const widthSlider = document.getElementById('brush-width');
                const widthLabel = document.getElementById('width-label');

                let canvas = null;
                let currentTool = 'pen';
                let currentColor = '#4ecdc4';
                let currentWidth = 4;
                let isRulerMode = false;
                let rulerStart = null;
                let rulerLine = null;

                const MAX_HISTORY = 30;
                let history = [];
                let historyIndex = -1;
                let isRestoring = false;

                // Estado da UI: 'hidden', 'collapsed', 'expanded'
                let uiState = 'hidden';
                let currentFile = null;

                // ============================================================
                // INICIALIZAÇÃO
                // ============================================================
                function init() {
                    canvas = new fabric.Canvas(canvasEl, {
                        selection: false,
                        renderOnAddRemove: true,
                        backgroundColor: 'transparent',
                        fireRightClick: false,
                        fireMiddleClick: false,
                    });

                    resizeCanvas();
                    window.addEventListener('resize', resizeCanvas);

                    const brush = new fabric.PencilBrush(canvas);
                    brush.color = currentColor;
                    brush.width = currentWidth;
                    canvas.freeDrawingBrush = brush;
                    canvas.isDrawingMode = true;

                    canvas.on('object:added', onObjectChange);
                    canvas.on('object:modified', onObjectChange);
                    canvas.on('object:removed', onObjectChange);

                    setupToolbarEvents();

                    hide();
                    console.log('✅ AnnotationModule inicializado.');
                }

                // ============================================================
                // REDIMENSIONAMENTO (sem DPR)
                // ============================================================
                function resizeCanvas() {
                    if (!canvas) return;
                    const rect = container.getBoundingClientRect();
                    const width = rect.width;
                    const height = rect.height;
                    if (width > 0 && height > 0) {
                        canvas.setDimensions({
                            width: width,
                            height: height
                        });
                        canvas.calcOffset();
                        canvas.renderAll();
                    }
                }

                // ============================================================
                // HISTÓRICO
                // ============================================================
                function saveHistory() {
                    if (isRestoring) return;
                    const json = JSON.stringify(canvas.toJSON(['id']));
                    if (historyIndex < history.length - 1) {
                        history = history.slice(0, historyIndex + 1);
                    }
                    history.push(json);
                    if (history.length > MAX_HISTORY) {
                        history.shift();
                    }
                    historyIndex = history.length - 1;
                }

                function onObjectChange() {
                    saveHistory();
                }

                function undo() {
                    if (historyIndex <= 0) return;
                    historyIndex--;
                    restoreState(historyIndex);
                }

                function redo() {
                    if (historyIndex >= history.length - 1) return;
                    historyIndex++;
                    restoreState(historyIndex);
                }

                function restoreState(index) {
                    if (index < 0 || index >= history.length) return;
                    isRestoring = true;
                    const json = history[index];
                    canvas.loadFromJSON(JSON.parse(json), () => {
                        canvas.renderAll();
                        isRestoring = false;
                    });
                }

                // ============================================================
                // FERRAMENTAS
                // ============================================================
                function setTool(tool) {
                    currentTool = tool;
                    isRulerMode = false;
                    if (rulerLine) {
                        canvas.remove(rulerLine);
                        rulerLine = null;
                        rulerStart = null;
                    }

                    document.querySelectorAll('[data-tool]').forEach(btn => {
                        btn.classList.toggle('active', btn.dataset.tool === tool);
                    });

                    switch (tool) {
                        case 'pen':
                            canvas.isDrawingMode = true;
                            const penBrush = new fabric.PencilBrush(canvas);
                            penBrush.color = currentColor;
                            penBrush.width = currentWidth;
                            penBrush.opacity = 1;
                            canvas.freeDrawingBrush = penBrush;
                            break;
                        case 'highlighter':
                            canvas.isDrawingMode = true;
                            const hlBrush = new fabric.PencilBrush(canvas);
                            hlBrush.color = currentColor;
                            hlBrush.width = currentWidth * 1.5;
                            hlBrush.opacity = 0.3;
                            hlBrush.blendMode = 'multiply';
                            canvas.freeDrawingBrush = hlBrush;
                            break;
                        case 'eraser':
                            canvas.isDrawingMode = true;
                            const eraserBrush = new fabric.PencilBrush(canvas);
                            eraserBrush.color = '#ffffff';
                            eraserBrush.width = currentWidth * 1.5;
                            eraserBrush.opacity = 1;
                            canvas.freeDrawingBrush = eraserBrush;
                            break;
                        case 'ruler':
                            canvas.isDrawingMode = false;
                            isRulerMode = true;
                            canvas.selection = false;
                            break;
                        default:
                            canvas.isDrawingMode = true;
                    }
                    canvas.selection = false;
                    canvas.renderAll();
                }

                function setColor(color) {
                    currentColor = color;
                    document.querySelectorAll('#color-palette .color-dot').forEach(dot => {
                        const parentBtn = dot.closest('.toolbar-btn');
                        const isActive = parentBtn && parentBtn.dataset.color === color;
                        dot.classList.toggle('active-dot', isActive);
                    });
                    if (currentTool === 'pen' || currentTool === 'highlighter') {
                        const brush = canvas.freeDrawingBrush;
                        if (brush) {
                            brush.color = color;
                            if (currentTool === 'highlighter') brush.opacity = 0.3;
                            else brush.opacity = 1;
                        }
                    }
                }

                function setWidth(width) {
                    currentWidth = parseFloat(width);
                    widthLabel.textContent = currentWidth;
                    if (currentTool === 'pen' || currentTool === 'highlighter' || currentTool === 'eraser') {
                        const brush = canvas.freeDrawingBrush;
                        if (brush) {
                            if (currentTool === 'highlighter') brush.width = currentWidth * 1.5;
                            else if (currentTool === 'eraser') brush.width = currentWidth * 1.5;
                            else brush.width = currentWidth;
                        }
                    }
                }

                // ============================================================
                // RÉGUA
                // ============================================================
                function handleRulerEvents() {
                    canvas.on('mouse:down', function(opt) {
                        if (!isRulerMode) return;
                        const pointer = canvas.getPointer(opt.e);
                        rulerStart = { x: pointer.x, y: pointer.y };
                        if (rulerLine) {
                            canvas.remove(rulerLine);
                            rulerLine = null;
                        }
                        rulerLine = new fabric.Line([pointer.x, pointer.y, pointer.x, pointer.y], {
                            stroke: currentColor,
                            strokeWidth: currentWidth,
                            originX: 'center',
                            originY: 'center',
                            selectable: false,
                            evented: false,
                        });
                        canvas.add(rulerLine);
                        canvas.renderAll();
                    });

                    canvas.on('mouse:move', function(opt) {
                        if (!isRulerMode || !rulerStart || !rulerLine) return;
                        const pointer = canvas.getPointer(opt.e);
                        rulerLine.set({
                            x1: rulerStart.x,
                            y1: rulerStart.y,
                            x2: pointer.x,
                            y2: pointer.y,
                        });
                        canvas.renderAll();
                    });

                    canvas.on('mouse:up', function() {
                        if (!isRulerMode || !rulerStart) return;
                        rulerStart = null;
                        if (rulerLine) {
                            rulerLine.selectable = false;
                            rulerLine.evented = false;
                            rulerLine = null;
                        }
                        canvas.renderAll();
                        saveHistory();
                    });
                }

                // ============================================================
                // CONTROLE DE ESTADO DA UI
                // ============================================================
                function setUIState(newState) {
                    uiState = newState;
                    switch (newState) {
                        case 'hidden':
                            container.classList.remove('active');
                            fab.classList.add('hidden-fab');
                            toolbar.classList.add('collapsed-toolbar');
                            canvasEl.style.pointerEvents = 'none';
                            break;
                        case 'collapsed':
                            container.classList.add('active');
                            fab.classList.remove('hidden-fab');
                            toolbar.classList.add('collapsed-toolbar');
                            canvasEl.style.pointerEvents = 'none';
                            break;
                        case 'expanded':
                            container.classList.add('active');
                            fab.classList.remove('hidden-fab');
                            toolbar.classList.remove('collapsed-toolbar');
                            canvasEl.style.pointerEvents = 'auto';
                            resizeCanvas();
                            break;
                    }
                }

                function expand() {
                    if (uiState === 'hidden') return;
                    setUIState('expanded');
                    setTool(currentTool);
                }

                function collapse() {
                    if (uiState === 'hidden') return;
                    setUIState('collapsed');
                }

                function hide() {
                    setUIState('hidden');
                }

                function show() {
                    expand();
                }

                // ============================================================
                // SALVAR / CARREGAR (localStorage)
                // ============================================================
                function getStorageKey(fileName) {
                    return 'annotation_' + fileName;
                }

                function save(fileName) {
                    if (!canvas || !fileName) return;
                    try {
                        const json = canvas.toJSON(['id']);
                        localStorage.setItem(getStorageKey(fileName), JSON.stringify(json));
                    } catch (e) {
                        console.warn('Erro ao salvar anotações:', e);
                    }
                }

                function load(fileName) {
                    if (!canvas) return;
                    currentFile = fileName;
                    try {
                        const raw = localStorage.getItem(getStorageKey(fileName));
                        if (raw) {
                            const json = JSON.parse(raw);
                            canvas.clear();
                            canvas.loadFromJSON(json, () => {
                                canvas.renderAll();
                                history = [];
                                historyIndex = -1;
                                saveHistory();
                            });
                        } else {
                            canvas.clear();
                            history = [];
                            historyIndex = -1;
                            saveHistory();
                        }
                    } catch (e) {
                        console.warn('Erro ao carregar anotações:', e);
                        canvas.clear();
                    }
                }

                // ============================================================
                // CONFIGURAÇÃO DA TOOLBAR E BOLHA
                // ============================================================
                function setupToolbarEvents() {
                    // Botões de ferramenta
                    document.querySelectorAll('[data-tool]').forEach(btn => {
                        btn.addEventListener('click', () => {
                            setTool(btn.dataset.tool);
                            if (uiState === 'collapsed') expand();
                        });
                    });

                    // Cores
                    document.querySelectorAll('#color-palette .toolbar-btn').forEach(btn => {
                        const color = btn.dataset.color;
                        if (color) {
                            btn.addEventListener('click', () => {
                                setColor(color);
                            });
                        }
                    });

                    // Espessura
                    widthSlider.addEventListener('input', function() {
                        setWidth(this.value);
                    });

                    // Desfazer/Refazer
                    document.getElementById('undo-btn').addEventListener('click', undo);
                    document.getElementById('redo-btn').addEventListener('click', redo);

                    // Minimizar (colapsar)
                    document.getElementById('minimize-annotation-btn').addEventListener('click', collapse);

                    // Bolha flutuante: alterna collapsed/expanded
                    fab.addEventListener('click', () => {
                        if (uiState === 'collapsed') {
                            expand();
                        } else if (uiState === 'expanded') {
                            collapse();
                        }
                    });

                    // Atalhos de teclado
                    document.addEventListener('keydown', function(e) {
                        if (e.ctrlKey || e.metaKey) return;
                        if (document.activeElement?.tagName === 'INPUT') return;
                        const key = e.key.toLowerCase();
                        const toolMap = {
                            'p': 'pen',
                            'h': 'highlighter',
                            'e': 'eraser',
                            'r': 'ruler',
                        };
                        if (key in toolMap) {
                            e.preventDefault();
                            setTool(toolMap[key]);
                            if (uiState === 'collapsed') expand();
                        }
                        if (e.ctrlKey && e.key === 'z') {
                            e.preventDefault();
                            undo();
                        }
                        if (e.ctrlKey && e.key === 'y') {
                            e.preventDefault();
                            redo();
                        }
                    });

                    setTool('pen');
                    setColor(currentColor);
                    handleRulerEvents();

                    // Autosave a cada 5s
                    setInterval(() => {
                        if (currentFile && uiState !== 'hidden') {
                            save(currentFile);
                        }
                    }, 5000);
                }

                // ============================================================
                // API PÚBLICA
                // ============================================================
                return {
                    init,
                    show,
                    hide,
                    expand,
                    collapse,
                    save,
                    load,
                    setTool,
                    setColor,
                    setWidth,
                    undo,
                    redo,
                    getCanvas: () => canvas,
                };
            })();

            // ============================================================
            // EVENT LISTENERS (navegação, teclado, fullscreen, etc.)
            // ============================================================
            $btnToggleSidebar.addEventListener('click', toggleSidebar);
            $btnCloseSidebar.addEventListener('click', () => setSidebarVisible(false));
            $sidebarOverlay.addEventListener('click', () => setSidebarVisible(false));
            $btnBack.addEventListener('click', goBackToWelcome);
            $breadcrumbHome.addEventListener('click', goBackToWelcome);
            $btnFullscreen.addEventListener('click', toggleFullscreen);

            $sidebarSearch.addEventListener('input', function() {
                const query = this.value;
                state.searchQuery = query;
                if (!query.trim()) {
                    renderSidebar();
                    state.searchQuery = '';
                } else {
                    applySearchFilter(query);
                }
            });
            $sidebarSearch.addEventListener('keydown', function(e) {
                if (e.key === 'Escape') {
                    clearSearch();
                    $sidebarSearch.blur();
                }
            });

            $resumeIframe.addEventListener('load', function() {
                $iframeLoader.classList.remove('visible');
                $resumeIframe.classList.add('loaded');
                try {
                    const iframeDoc = $resumeIframe.contentDocument || $resumeIframe.contentWindow?.document;
                    if (iframeDoc) {
                        if (!iframeDoc.getElementById('hub-scrollbar-style')) {
                            const style = iframeDoc.createElement('style');
                            style.id = 'hub-scrollbar-style';
                            style.textContent = `
                                ::-webkit-scrollbar { width: 7px; height: 7px; }
                                ::-webkit-scrollbar-track { background: #141428; border-radius: 6px; }
                                ::-webkit-scrollbar-thumb { background: #3a3a58; border-radius: 6px; transition: background 0.2s ease; }
                                ::-webkit-scrollbar-thumb:hover { background: #7c3aed; }
                                * { scrollbar-width: thin; scrollbar-color: #3a3a58 #141428; }
                            `;
                            iframeDoc.head.appendChild(style);
                            console.log('✅ Estilos de scrollbar injetados no iframe.');
                        }
                    }
                } catch (e) {
                    console.log('ℹ️ Não foi possível injetar estilos de scrollbar no iframe (cross-origin ou restrição).');
                }
            });

            $resumeIframe.addEventListener('error', function() {
                $iframeLoader.classList.remove('visible');
                $resumeIframe.classList.add('loaded');
            });

            document.addEventListener('fullscreenchange', () => {
                updateFullscreenUI(!!document.fullscreenElement);
            });
            document.addEventListener('webkitfullscreenchange', () => {
                updateFullscreenUI(!!document.webkitFullscreenElement);
            });

            document.addEventListener('keydown', function(e) {
                if ((e.ctrlKey || e.metaKey) && e.key === 'b') {
                    e.preventDefault();
                    toggleSidebar();
                }
                if ((e.ctrlKey || e.metaKey) && e.key === 'f') {
                    e.preventDefault();
                    setSidebarVisible(true);
                    setTimeout(() => $sidebarSearch.focus(), 300);
                }
                if (e.key === '/' && document.activeElement !== $sidebarSearch && document
                    .activeElement?.tagName !== 'INPUT' && document.activeElement?.tagName !==
                    'TEXTAREA') {
                    e.preventDefault();
                    setSidebarVisible(true);
                    setTimeout(() => $sidebarSearch.focus(), 300);
                }
                if (e.key === 'Escape' && state.activeResume && document.activeElement === document
                    .body) {
                    goBackToWelcome();
                }
            });

            window.addEventListener('resize', () => {
                if (window.innerWidth > 768 && $sidebarOverlay.classList.contains(
                        'visible')) {
                    $sidebarOverlay.classList.remove('visible');
                }
            });

            // Salvar anotações antes de fechar
            window.addEventListener('beforeunload', function() {
                if (state.activeResume && state.activeResume.fileName) {
                    AnnotationModule.save(state.activeResume.fileName);
                }
            });

            // ============================================================
            // INICIALIZAÇÃO
            // ============================================================
            function init() {
                loadState();

                if (state.sidebarVisible) {
                    $sidebar.classList.remove('collapsed');
                } else {
                    $sidebar.classList.add('collapsed');
                }

                renderSidebar();
                updateWelcomeStats();

                AnnotationModule.init();

                if (state.activeResume && state.activeResume.fileName) {
                    const ar = state.activeResume;
                    updateBreadcrumb(ar.deckName, ar.categoryName, ar.itemName);
                    loadIframe(ar.fileName);
                    showIframe();
                    state.expandedDecks.add(ar.deckId);
                    state.expandedCategories.add(`${ar.deckId}|${ar.categoryIndex}`);
                    persistState();
                    renderSidebar();

                    AnnotationModule.load(ar.fileName);
                    AnnotationModule.expand();

                    setTimeout(() => {
                        const activeItem = $sidebarDecksList.querySelector('.resume-item.active');
                        if (activeItem) {
                            activeItem.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
                        }
                    }, 300);
                } else {
                    updateBreadcrumb(null, null, null);
                    showWelcome();
                    AnnotationModule.hide();
                }

                updateFullscreenUI(!!document.fullscreenElement || !!document.webkitFullscreenElement);

                console.log('%c🚀 Hub de Estudos (com anotações corrigidas) inicializado!',
                    'color: #a78bfa; font-size: 1.1rem; font-weight: bold;');
                console.log('%c✏️ Anotações: toque na bolha para abrir as ferramentas.',
                    'color: #7878a0; font-style: italic;');
                console.log('%c💡 Atalhos: P (caneta), H (marca-texto), E (borracha), R (régua), Ctrl+Z (desfazer), Ctrl+Y (refazer)',
                    'color: #7878a0;');
            }

            // Expor funções e API
            window.openResume = openResume;
            window.goBackToWelcome = goBackToWelcome;

            init();

            window.HubEstudos = {
                decks: DECKS,
                state,
                goBackToWelcome,
                toggleSidebar,
                setSidebarVisible,
                toggleFullscreen,
                clearSearch,
                renderSidebar,
                persistState,
                openResume,
                AnnotationModule,
                getStats: () => ({
                    decks: DECKS.length,
                    categories: DECKS.reduce((acc, d) => acc + d.categories.length, 0),
                    items: DECKS.reduce((acc, d) => acc + d.categories.reduce((a, c) => a + c.items.length, 0),
                        0),
                }),
            };

            console.log('%c📋 API disponível em window.HubEstudos', 'color: #7878a0;');
        })();
    </script>
</body>
</html>
